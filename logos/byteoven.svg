<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="fb" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="ff" x1="0%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="50%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="fd" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f0a2a"/>
    </linearGradient>
    <filter id="fg">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Body -->
  <rect x="4" y="10" width="40" height="34" rx="6" fill="url(#fb)"/>
  <!-- Top panel -->
  <rect x="4" y="10" width="40" height="10" rx="6" fill="#8b5cf6"/>
  <rect x="4" y="16" width="40" height="4" fill="#8b5cf6"/>
  <!-- Knobs -->
  <circle cx="14" cy="15" r="2.5" fill="#c4b5fd"/>
  <circle cx="24" cy="15" r="2.5" fill="#c4b5fd"/>
  <circle cx="34" cy="15" r="2.5" fill="#c4b5fd"/>
  <!-- Door -->
  <rect x="9" y="23" width="30" height="18" rx="4" fill="url(#fd)"/>
  <!-- Handle -->
  <rect x="15" y="22" width="18" height="2.5" rx="1.25" fill="#a78bfa" opacity="0.85"/>
  <!-- Code glow inside -->
  <text x="13" y="37" font-family="monospace" font-size="12" font-weight="700" fill="#c084fc" opacity="0.75" filter="url(#fg)">&lt;/&gt;</text>
  <!-- Heat waves -->
  <path d="M16 8 Q18 4 16 1" stroke="url(#ff)" stroke-width="2" fill="none" opacity="0.75" stroke-linecap="round"/>
  <path d="M24 7 Q26 2 24 -1" stroke="url(#ff)" stroke-width="2" fill="none" opacity="0.9" stroke-linecap="round"/>
  <path d="M32 8 Q34 4 32 1" stroke="url(#ff)" stroke-width="2" fill="none" opacity="0.75" stroke-linecap="round"/>
</svg>
