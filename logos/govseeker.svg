<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36">
  <defs>
    <linearGradient id="fb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1d3a"/>
      <stop offset="100%" stop-color="#1a3258"/>
    </linearGradient>
    <linearGradient id="fg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c84a"/>
      <stop offset="100%" stop-color="#c9a227"/>
    </linearGradient>
  </defs>
  <rect width="36" height="36" rx="7" fill="url(#fb)"/>
  <!-- Magnifying glass ring -->
  <circle cx="16" cy="15.5" r="9.5" fill="none" stroke="url(#fg)" stroke-width="2.8" opacity="0.9"/>
  <!-- Glass highlight arc -->
  <path d="M10,11 Q13,7 19,9" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Handle -->
  <line x1="23" y1="22.5" x2="29.5" y2="29" stroke="#c9a227" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Handle accent -->
  <line x1="23" y1="22.5" x2="29.5" y2="29" stroke="#e8c84a" stroke-width="1.8" stroke-linecap="round" opacity="0.4"/>
  <!-- Bold S inside the lens -->
  <text x="16" y="20.5" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-size="15" font-weight="900" fill="#ffffff" letter-spacing="-0.5">S</text>
</svg>
